name: release-please

on:
  push:
    branches: [main]

permissions:
  contents: write        # create tags + releases
  pull-requests: write   # maintain the Release PR

jobs:
  release-please:
    name: release-please + goreleaser
    runs-on: ubuntu-latest
    steps:
      # Step 1: maintain the Release PR on main. When a Release PR is merged,
      # release-please creates a tag + GitHub Release and sets the outputs
      # we gate the goreleaser step on.
      - uses: googleapis/release-please-action@v4
        id: release
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          config-file: release-please-config.json
          manifest-file: .release-please-manifest.json

      # Everything below only runs on the merge of a Release PR — i.e. when
      # release-please actually cut a new version.
      - uses: actions/checkout@v4
        if: ${{ steps.release.outputs.release_created }}
        with:
          fetch-depth: 0    # goreleaser wants the full git history

      - uses: actions/setup-go@v5
        if: ${{ steps.release.outputs.release_created }}
        with:
          go-version: '1.25'
          cache: true

      - name: goreleaser release
        if: ${{ steps.release.outputs.release_created }}
        uses: goreleaser/goreleaser-action@v6
        with:
          distribution: goreleaser
          version: '~> v2'
          args: release --clean
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # CGO_ENABLED baked into .goreleaser.yaml per-build; mattn/go-sqlite3
          # compiles natively on the amd64 ubuntu runner.
