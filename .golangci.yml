# golangci-lint v2 config schema.
# Migration: v1 "disable-all + enable" -> v2 "default: none + enable".
# Formatters (gofmt/goimports) are a separate top-level block in v2.
version: "2"

run:
  timeout: 5m
  tests: true

linters:
  default: none
  enable:
    - errcheck
    - govet
    - ineffassign
    - misspell
    - staticcheck
    - unused
  exclusions:
    # Local clones + test tmp; not our code to lint.
    paths:
      - whatsmeow
      - tmp
    rules:
      # Test code routinely ignores Close() errors on tmp resources.
      - path: _test\.go
        linters:
          - errcheck

formatters:
  enable:
    - gofmt
    - goimports
