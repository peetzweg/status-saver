# status-saver configuration
# Copy to /etc/status-saver/config.yaml (or pass --config) and adjust paths.

# Where decrypted status media and metadata JSON files are written.
data_dir: /var/lib/status-saver/data

# whatsmeow device-store SQLite DB (created by `status-saver pair` on first pairing).
session_db: /var/lib/status-saver/session.db

# Dedup index — tracks seen status messages so restarts are idempotent.
index_db: /var/lib/status-saver/index.db

# Days to keep archived status data. 0 (the default) = keep forever. Set to
# a positive integer to enable the `status-saver rotate` subcommand's
# pruning. The rotate schedule itself lives in the systemd timer (or
# whatever scheduler calls `status-saver rotate`), not here — a pass
# does nothing when retention_days == 0.
retention_days: 0

# zerolog level: trace|debug|info|warn|error
log_level: info

# Optional: POST to this URL when the daemon exits because the WhatsApp session
# was logged out (e.g. device removed from the phone). Useful for ntfy.sh/Slack
# alerts. Empty = disabled.
alert_webhook: ""

# Optional: listen for /metrics and /health on this address. Empty = disabled.
# Bind to 127.0.0.1 only; there is no auth on these endpoints.
# /metrics is Prometheus text format; /health returns 200 when connected,
# 503 when the WhatsApp session is down.
metrics_addr: ""
