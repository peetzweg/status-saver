# https://goreleaser.com/customization/
# Validated locally with `goreleaser check` before each release.
version: 2

before:
  hooks:
    - go mod tidy

# Single binary now — dispatcher at cmd/status-saver with run/pair/rotate
# subcommands. Version info embedded via internal/buildinfo.
builds:
  - id: status-saver
    main: ./cmd/status-saver
    binary: status-saver
    env:
      - CGO_ENABLED=1
    goos: [linux]
    goarch: [amd64]
    ldflags:
      - -s -w
      - -X github.com/ppoloczek/status-saver/internal/buildinfo.Version={{.Version}}
      - -X github.com/ppoloczek/status-saver/internal/buildinfo.Commit={{.Commit}}
      - -X github.com/ppoloczek/status-saver/internal/buildinfo.Date={{.Date}}

archives:
  - id: bundle
    ids: [status-saver]
    name_template: "{{ .ProjectName }}_{{ .Version }}_{{ .Os }}_{{ .Arch }}"
    formats: [tar.gz]
    files:
      - README.md
      - LICENSE
      - CHANGELOG.md
      - config.example.yaml
      - deploy/systemd/*
      - deploy/launchd/*

checksum:
  name_template: "checksums.txt"

snapshot:
  version_template: "{{ incpatch .Version }}-next"

release:
  # release-please creates the GitHub Release with the auto-generated body
  # and the git tag. goreleaser finds that release and only uploads
  # artifacts — it doesn't touch the body.
  mode: keep-existing
  # For non-prod 0.x versions, mark as prerelease in GitHub's UI. Flip off
  # once we graduate to 1.0.0.
  prerelease: auto
